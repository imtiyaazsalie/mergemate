# MergeMate CI workflow — runs PR review actions on demand.
# This is v1.0 of this workflow file

name: MergeMate

on:
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  mergemate_job:
    runs-on: ubuntu-latest
    name: Run MergeMate on every pull request
    steps:
      - name: MergeMate action step
        id: mergemate
        uses: mergemate/mergemate@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI_ORG: ${{ secrets.OPENAI_ORG }} # optional
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PINECONE.API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE.ENVIRONMENT: ${{ secrets.PINECONE_ENVIRONMENT }}
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: true
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: true
          GITHUB_ACTION_CONFIG.AUTO_IMPROVE: true
