name: Docs CI

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-ci.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material mkdocs-glightbox
      - run: mkdocs gh-deploy -f docs/mkdocs.yml --force
