site_name: MergeMate
site_url: https://imtiyaazsalie.github.io/mergemate/
repo_url: https://github.com/imtiyaazsalie/mergemate
repo_name: imtiyaazsalie/mergemate

nav:
  - Home: index.md
  - Get Started:
      - Quick Setup: installation/mergemate.md
      - Local CLI: installation/locally.md
      - GitHub: installation/github.md
      - GitLab: installation/gitlab.md
      - Bitbucket: installation/bitbucket.md
      - Azure DevOps: installation/azure.md
      - Gitea: installation/gitea.md
  - Commands:
      - Overview: tools/index.md
      - Review: tools/review.md
      - Describe: tools/describe.md
      - Improve: tools/improve.md
      - Ask: tools/ask.md
      - Labels: tools/generate_labels.md
      - Docs: tools/add_docs.md
      - Changelog: tools/update_changelog.md
      - Similar: tools/similar_issues.md
      - Help: tools/help.md
      - Help Docs: tools/help_docs.md
  - Configure:
      - Config File: usage-guide/configuration_options.md
      - Automation: usage-guide/automations_and_usage.md
      - AI Models: usage-guide/changing_a_model.md
      - Advanced: usage-guide/additional_configurations.md
      - Email: usage-guide/mail_notifications.md
  - How It Works:
      - Compression: core-abilities/compression_strategy.md
      - Context: core-abilities/dynamic_context.md
      - Tickets: core-abilities/fetching_ticket_context.md
      - Chat: core-abilities/interactivity.md
      - Metadata: core-abilities/metadata.md
      - Self-Review: core-abilities/self_reflection.md
  - More:
      - FAQ: faq/index.md
      - Privacy: overview/data_privacy.md

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Light mode

plugins:
  - search
  - glightbox

extra_css:
  - css/terminal.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      title: On this page

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/imtiyaazsalie/mergemate

copyright: MergeMate
