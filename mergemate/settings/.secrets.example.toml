# MergeMate Secrets Template
# Copy this to mergemate/settings/.secrets.toml and fill in your keys
# NEVER commit .secrets.toml — it's in .gitignore

[github]
# GitHub personal access token (classic) with 'repo' scope
# Get one: https://github.com/settings/tokens
user_token = ""

[openai]
# OpenAI API key
key = ""

[deepseek]
# DeepSeek API key
# Get one: https://platform.deepseek.com/api_keys
key = ""

[anthropic]
# Anthropic/Claude API key
key = ""
